<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <style>
    .bg { fill: #FAFAF7; }
    .accent { fill: #A32D2D; }
    .text { fill: #1A1C20; }
    .text-2 { fill: #5C5E64; }
    .text-3 { fill: #8E9096; }
    .serif { font-family: 'Source Serif 4', Georgia, serif; font-weight: 500; }
    .sans { font-family: 'Inter', -apple-system, system-ui, sans-serif; }
    .mono { font-family: 'IBM Plex Mono', monospace; }
    .bold { font-weight: 700; }
  </style>
  <rect class="bg" width="1200" height="675"/>

  <text x="60" y="60" class="mono accent" font-size="13" letter-spacing="1.5" text-transform="uppercase">BIG TECH FILES · MATRYCA</text>

  
  <text x="60" y="140" class="serif text" font-size="42" letter-spacing="-0.5">
    Without these six people
  </text>
  <text x="60" y="185" class="serif text" font-size="42" letter-spacing="-0.5">
    this database would not exist.
  </text>
  <text x="60" y="225" class="mono text-2" font-size="14">Whistleblowers, journalists and activists who unpicked the biggest Big Tech cases.</text>

  
    <g transform="translate(60, 300)">
      <line x1="0" y1="0" x2="40" y2="0" class="accent" stroke="#A32D2D" stroke-width="2"/>
      <text x="0" y="30" class="serif bold" font-size="20" fill="#1A1C20">Frances Haugen</text>
      <text x="0" y="56" class="mono text-2" font-size="12">whistleblower · Meta</text>
      <text x="0" y="82" class="mono text-3" font-size="11">Facebook Files (A05)</text>
    </g>

    <g transform="translate(430, 300)">
      <line x1="0" y1="0" x2="40" y2="0" class="accent" stroke="#A32D2D" stroke-width="2"/>
      <text x="0" y="30" class="serif bold" font-size="20" fill="#1A1C20">Christopher Wylie</text>
      <text x="0" y="56" class="mono text-2" font-size="12">whistleblower · CA</text>
      <text x="0" y="82" class="mono text-3" font-size="11">Cambridge Analytica (A02)</text>
    </g>

    <g transform="translate(800, 300)">
      <line x1="0" y1="0" x2="40" y2="0" class="accent" stroke="#A32D2D" stroke-width="2"/>
      <text x="0" y="30" class="serif bold" font-size="20" fill="#1A1C20">Sophie Zhang</text>
      <text x="0" y="56" class="mono text-2" font-size="12">whistleblower · Meta</text>
      <text x="0" y="82" class="mono text-3" font-size="11">election manipulation (A05)</text>
    </g>

    <g transform="translate(60, 450)">
      <line x1="0" y1="0" x2="40" y2="0" class="accent" stroke="#A32D2D" stroke-width="2"/>
      <text x="0" y="30" class="serif bold" font-size="20" fill="#1A1C20">Max Schrems</text>
      <text x="0" y="56" class="mono text-2" font-size="12">activist · NOYB</text>
      <text x="0" y="82" class="mono text-3" font-size="11">Schrems II + GDPR (A07, A09)</text>
    </g>

    <g transform="translate(430, 450)">
      <line x1="0" y1="0" x2="40" y2="0" class="accent" stroke="#A32D2D" stroke-width="2"/>
      <text x="0" y="30" class="serif bold" font-size="20" fill="#1A1C20">Kashmir Hill</text>
      <text x="0" y="56" class="mono text-2" font-size="12">journalist · NYT</text>
      <text x="0" y="82" class="mono text-3" font-size="11">Clearview AI (E05)</text>
    </g>

    <g transform="translate(800, 450)">
      <line x1="0" y1="0" x2="40" y2="0" class="accent" stroke="#A32D2D" stroke-width="2"/>
      <text x="0" y="30" class="serif bold" font-size="20" fill="#1A1C20">Carole Cadwalladr</text>
      <text x="0" y="56" class="mono text-2" font-size="12">journalist · Observer</text>
      <text x="0" y="82" class="mono text-3" font-size="11">Cambridge Analytica (A02)</text>
    </g>


  <text x="60" y="620" class="mono text-3" font-size="11">Full gallery of 12 people: matryca.org/en/who-revealed</text>


  <line x1="60" y1="625" x2="1140" y2="625" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>
  <text x="60" y="650" class="mono text-3" font-size="11">matryca.org · educational material, free to reuse · 2026</text>
  <text x="1140" y="650" class="mono text-3" font-size="11" text-anchor="end">Who revealed it?</text>
</svg>
