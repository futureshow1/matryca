  <line x1="60" y1="625" x2="1140" y2="625" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>
  <text x="60" y="650" class="mono text-3" font-size="11">matryca.org · educational material, free to reuse · 2026</text>
  <text x="1140" y="650" class="mono text-3" font-size="11" text-anchor="end">Six firms, 27 cases</text>
