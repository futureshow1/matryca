    <text x="60" y="459" class="serif bold" font-size="20" fill="#1A1C20">Uber</text>
    <rect x="220" y="437" width="270" height="30" fill="#d97706"/>
    <text x="500" y="459" class="mono text-2" font-size="13">3 cases</text>
    <text x="700" y="459" class="mono text-2" font-size="13">—</text>
    <text x="900" y="459" class="mono text-2" font-size="13">$0.296 bn</text>

    <text x="60" y="514" class="serif bold" font-size="20" fill="#1A1C20">Apple</text>
