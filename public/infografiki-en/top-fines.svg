<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <style>
    .bg { fill: #FAFAF7; }
    .accent { fill: #A32D2D; }
    .text { fill: #1A1C20; }
    .text-2 { fill: #5C5E64; }
    .text-3 { fill: #8E9096; }
    .serif { font-family: 'Source Serif 4', Georgia, serif; font-weight: 500; }
    .sans { font-family: 'Inter', -apple-system, system-ui, sans-serif; }
    .mono { font-family: 'IBM Plex Mono', monospace; }
    .bold { font-weight: 700; }
  </style>
  <rect class="bg" width="1200" height="675"/>

  <text x="60" y="60" class="mono accent" font-size="13" letter-spacing="1.5" text-transform="uppercase">BIG TECH FILES · MATRYCA</text>

  
  <text x="60" y="140" class="serif text" font-size="42" letter-spacing="-0.5">
    Top 5 GDPR fines.
  </text>
  <text x="60" y="185" class="serif text" font-size="42" letter-spacing="-0.5">
    All from Dublin.
  </text>
  <text x="60" y="225" class="mono text-2" font-size="14">Irish DPC — the lead regulator for Big Tech under GDPR. All five largest fines — from there.</text>

  
    <text x="60" y="275" class="mono text-2" font-size="11">A07 · 2023</text>
    <rect x="60" y="280" width="900.0" height="30" class="accent"/>
    <text x="970.0" y="300" class="sans bold" font-size="15" fill="#1A1C20">&#8364;1200M</text>
    <text x="60" y="328" class="mono text-2" font-size="11">Meta / DPC Ireland — US data transfers</text>

    <text x="60" y="330" class="mono text-2" font-size="11">E03 · 2025</text>
    <rect x="60" y="335" width="397.5" height="30" class="accent"/>
    <text x="467.5" y="355" class="sans bold" font-size="15" fill="#1A1C20">&#8364;530M</text>
    <text x="60" y="383" class="mono text-2" font-size="11">TikTok / DPC Ireland — transfers to China</text>

    <text x="60" y="385" class="mono text-2" font-size="11">A09 · 2023</text>
    <rect x="60" y="390" width="292.5" height="30" class="accent"/>
    <text x="362.5" y="410" class="sans bold" font-size="15" fill="#1A1C20">&#8364;390M</text>
    <text x="60" y="438" class="mono text-2" font-size="11">Meta / DPC Ireland — ads without consent</text>

    <text x="60" y="440" class="mono text-2" font-size="11">E02 · 2023</text>
    <rect x="60" y="445" width="258.75" height="30" class="accent"/>
    <text x="328.75" y="465" class="sans bold" font-size="15" fill="#1A1C20">&#8364;345M</text>
    <text x="60" y="493" class="mono text-2" font-size="11">TikTok / DPC Ireland — children's data</text>

    <text x="60" y="495" class="mono text-2" font-size="11">C05 · 2024</text>
    <rect x="60" y="500" width="232.50000000000003" height="30" class="accent"/>
    <text x="302.5" y="520" class="sans bold" font-size="15" fill="#1A1C20">&#8364;310M</text>
    <text x="60" y="548" class="mono text-2" font-size="11">LinkedIn / DPC Ireland — AI training without consent</text>


  <text x="60" y="600" class="mono text-3" font-size="11">Total: &#8364;2.775 billion. One regulator office. 13 companies with European headquarters there.</text>


  <line x1="60" y1="625" x2="1140" y2="625" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>
  <text x="60" y="650" class="mono text-3" font-size="11">matryca.org · educational material, free to reuse · 2026</text>
  <text x="1140" y="650" class="mono text-3" font-size="11" text-anchor="end">Top 5 GDPR fines</text>
